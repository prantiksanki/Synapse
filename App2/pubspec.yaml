name: synapse
description: "SYNAPSE: on-device sign detection with local sentence generation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  hand_landmarker: ^2.1.1
  tflite_flutter: ^0.12.1
  onnxruntime: ^1.4.1
  provider: ^6.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.0.5
  flutter_webrtc: ^1.4.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # Only hand-landmark and classifier models — NOT the T5 grammar models.
    # T5 models are downloaded on first launch and stored in app storage.
    - assets/models/hand_landmarker.task
    - assets/models/keypoint_classifier.tflite
    - assets/models/keypoint_classifier_label.csv
    - assets/models/t5_vocab.txt
    - assets/sign_images/
