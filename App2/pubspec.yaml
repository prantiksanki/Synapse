name: synapse
description: "VAANI: on-device sign detection with local sentence generation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  camera_platform_interface: ^2.10.0
  hand_landmarker: ^2.1.1
  onnxruntime: ^1.4.1
  provider: ^6.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  socket_io_client: ^3.1.1
  connectivity_plus: ^6.0.5
  flutter_webrtc: ^1.4.1
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  flutter_overlay_window: ^0.4.3
  video_player: ^2.9.2
  url_launcher: ^6.3.2
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # Only hand-landmark and classifier models — NOT the T5 grammar models.
    # T5 models are downloaded on first launch and stored in app storage.
    - .env
    - assets/models/hand_landmarker.task
    - assets/models/t5_vocab.txt
    - assets/models/sign_classifier.tflite
    - assets/models/sign_labels.txt
    - assets/models/sign_norm.json
    - assets/sign_images/
    - assets/sign_videos/
    - assets/Logo.png
    - assets/mascotAnimation.json
    - assets/visit.gif
    - assets/questineers.gif
    - assets/after_questineers.gif
    - assets/Welcome.gif
    - assets/EEG.mp4
    - assets/Video.mp4
    - assets/Product.jpeg
