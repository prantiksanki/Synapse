name: synapse
description: "SYNAPSE: on-device sign detection with local sentence generation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  hand_landmarker: ^2.1.1
  tflite_flutter: ^0.12.1
  provider: ^6.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
