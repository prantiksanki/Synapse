// App-level build.gradle for SYNAPSE.
// Configures the Android application, NDK/CMake for llama.cpp native code,
// and all required dependencies including TensorFlow Lite.

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.synapse.app"
    compileSdk 34

    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.synapse.app"
        minSdk 24
        targetSdk 34
        versionCode flutter.versionCode
        versionName flutter.versionName

        // CMake configuration for llama.cpp native bridge
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3"
                abiFilters "arm64-v8a", "x86_64"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    // Link CMakeLists.txt for native code compilation
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Allow large model files and shared C++ library
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
        // Exclude duplicate native libs
        excludes += ['/META-INF/{AL2.0,LGPL2.1}']
    }
}

flutter {
    source '../..'
}

dependencies {
    // Kotlin standard library
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"

    // TensorFlow Lite for gesture classification
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'
    implementation 'org.tensorflow:tensorflow-lite-support:0.4.4'
    implementation 'org.tensorflow:tensorflow-lite-metadata:0.4.4'

    // TFLite GPU delegate for accelerated inference
    implementation 'org.tensorflow:tensorflow-lite-gpu:2.14.0'

    // AndroidX core utilities
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
