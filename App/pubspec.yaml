name: synapse
description: Real-time sign language detection with local LLM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_commons: ^0.6.0
  tflite_flutter: ^0.10.4
  http: ^1.2.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  provider: ^6.1.2
  dio: ^5.4.2+1
  flutter_tts: ^4.0.2
  wakelock_plus: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/labels/
    - assets/models/
